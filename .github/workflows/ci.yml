name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev tooling
        # The unit tests exercise the deterministic core (grading + routing) and need
        # only pydantic, so we avoid installing the heavy LLM stack in CI.
        run: pip install pydantic pytest ruff mypy

      - name: Lint
        run: ruff check .

      - name: Type-check core
        run: mypy src/orchestration/contracts.py src/orchestration/sandbox.py src/orchestration/routing.py src/orchestration/config.py

      - name: Unit tests
        run: pytest -q
