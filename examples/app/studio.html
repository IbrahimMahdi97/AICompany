<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Studio</title>
<style>
  :root { color-scheme: light dark; --accent: #14b8a6; --accent-2: #2dd4bf; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0b1220; color: #e2e8f0; }
  @media (prefers-color-scheme: light) { body { background: #eef2f7; color: #0f172a; } }
  header { padding: 22px 24px; border-bottom: 1px solid rgba(148,163,184,.25); }
  header h1 { margin: 0; font-size: 20px; }
  header .sub { color: #94a3b8; font-size: 13px; margin-top: 4px; }
  main { max-width: 820px; margin: 0 auto; padding: 22px 16px 70px; display: grid; gap: 18px; }
  .card { background: rgba(148,163,184,.10); border: 1px solid rgba(148,163,184,.22);
    border-radius: 16px; padding: 18px; }
  textarea { width: 100%; min-height: 120px; resize: vertical; padding: 12px 14px; border-radius: 12px;
    border: 1px solid rgba(148,163,184,.35); background: rgba(255,255,255,.04); color: inherit;
    font-size: 15px; font-family: inherit; line-height: 1.5; }
  textarea:focus, input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .btn { padding: 11px 22px; border: none; border-radius: 11px; cursor: pointer; font-weight: 700;
    font-size: 15px; background: var(--accent); color: #05201d; }
  .btn:hover { background: var(--accent-2); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: #94a3b8; border: 1px solid rgba(148,163,184,.4); font-weight: 600; }
  .btn.ghost:hover { background: rgba(148,163,184,.12); }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  h2 { font-size: 15px; margin: 0 0 12px; }
  .muted { color: #94a3b8; font-size: 13px; }
  .hidden { display: none; }
  .spinner { width: 18px; height: 18px; border: 3px solid rgba(148,163,184,.35); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  ul.q { margin: 6px 0 12px; padding-left: 20px; }
  ul.q li { margin: 5px 0; font-size: 14px; }
  .crit { display: flex; align-items: center; gap: 10px; padding: 7px 0; font-size: 14px;
    border-bottom: 1px solid rgba(148,163,184,.15); }
  .badge { font-size: 12px; font-weight: 700; padding: 2px 9px; border-radius: 999px; }
  .pass { background: rgba(20,184,166,.16); color: #5eead4; }
  .fail { background: rgba(248,113,113,.16); color: #fca5a5; }
  .verdict { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .files code { font-family: ui-monospace, monospace; font-size: 13px; background: rgba(148,163,184,.15);
    padding: 2px 7px; border-radius: 6px; margin-right: 6px; }
  .fn { font-family: ui-monospace, monospace; font-size: 15px; font-weight: 600; }
  .doc { color: #94a3b8; font-size: 13px; white-space: pre-wrap; margin: 6px 0 12px; }
  .row { display: grid; grid-template-columns: 160px 1fr; gap: 10px; align-items: center; margin-bottom: 8px; }
  .row label { font-family: ui-monospace, monospace; font-size: 13px; }
  .row .ann { color: #64748b; font-weight: 400; }
  input { width: 100%; padding: 9px 11px; border-radius: 9px; border: 1px solid rgba(148,163,184,.35);
    background: rgba(255,255,255,.04); color: inherit; font-size: 14px; font-family: ui-monospace, monospace; }
  .out { margin-top: 10px; padding: 11px 13px; border-radius: 10px; font-family: ui-monospace, monospace;
    font-size: 13px; white-space: pre-wrap; word-break: break-word; display: none; }
  .out.ok { display: block; background: rgba(20,184,166,.12); border: 1px solid rgba(20,184,166,.4); }
  .out.err { display: block; background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.5); color: #fca5a5; }
</style></head>
<body>
  <header>
    <h1>Agent Studio</h1>
    <div class="sub">Type a goal — the BA/Developer/QA agents build it, then you run it here.</div>
  </header>
  <main>
    <div class="card">
      <h2>Goal</h2>
      <textarea id="goal" placeholder="Describe what to build. Works best as a pure-Python API with clear, testable behavior — e.g. &#10;A safe arithmetic calculator: evaluate(expression: str) -> dict with precedence, parentheses, and divide-by-zero handling."></textarea>
      <div class="toolbar">
        <button class="btn" id="build">Build it</button>
        <span class="muted" id="hint">Standard-library Python only (the QA sandbox has no network).</span>
      </div>
    </div>

    <div class="card hidden" id="status"></div>
    <div class="card hidden" id="questions"></div>
    <div class="card hidden" id="results"></div>
    <div class="card hidden" id="runner"></div>
  </main>

<script>
const $ = (id) => document.getElementById(id);
let threadId = null;

const buildBtn = $("build");
const statusEl = $("status"), qEl = $("questions"), resEl = $("results"), runEl = $("runner");

function show(el, html) { el.classList.remove("hidden"); el.innerHTML = html; }
function hide(...els) { els.forEach(e => e.classList.add("hidden")); }
function loading(msg) {
  buildBtn.disabled = true;
  show(statusEl, '<span class="spinner"></span> &nbsp;' + escapeHtml(msg));
}
function idle() { buildBtn.disabled = false; }

buildBtn.addEventListener("click", () => {
  const goal = $("goal").value.trim();
  if (!goal) { $("goal").focus(); return; }
  threadId = "web-" + Date.now();
  hide(qEl, resEl, runEl);
  loading("The Business Analyst is reviewing your goal…");
  post("/run", { goal, thread_id: threadId }).then(handle).catch(fail);
});

function handle(data) {
  idle();
  if (data.status === "error") return fail(new Error(data.error));
  if (data.status === "needs_input") return renderQuestions(data.questions);
  if (data.status === "done") { hide(statusEl, qEl); renderResults(data); renderRunner(data.functions); }
}
function fail(err) {
  idle();
  show(statusEl, '<div class="out err">' + escapeHtml(String(err.message || err)) + "</div>");
}

function renderQuestions(questions) {
  hide(statusEl);
  const items = questions.map(q => "<li>" + escapeHtml(q) + "</li>").join("");
  show(qEl,
    "<h2>The analyst needs a few clarifications</h2>"
    + '<ul class="q">' + items + "</ul>"
    + '<textarea id="answers" placeholder="Answer in plain text, or click ‘Use sensible defaults’."></textarea>'
    + '<div class="toolbar">'
    + '  <button class="btn" id="continue">Continue</button>'
    + '  <button class="btn ghost" id="defaults">Use sensible defaults</button>'
    + "</div>");
  $("continue").addEventListener("click", () => resume($("answers").value.trim() || "default for all"));
  $("defaults").addEventListener("click", () => resume("default for all"));
}

function resume(answers) {
  hide(qEl);
  loading("Building: writing tests, implementing, and running QA… this can take a minute or two.");
  post("/resume", { thread_id: threadId, answers }).then(handle).catch(fail);
}

function renderResults(d) {
  const verdict = d.delivered
    ? '<span class="verdict" style="color:#5eead4">✓ Delivered</span> after ' + d.rounds + " QA round(s)"
    : '<span class="verdict" style="color:#fca5a5">Escalated</span> — still failing after ' + d.rounds + " round(s)";
  const crits = d.criteria.map(c =>
    '<div class="crit"><span class="badge ' + (c.passed ? "pass\">PASS" : "fail\">FAIL")
    + "</span><span>" + escapeHtml(c.id) + "</span><span class=\"muted\">" + escapeHtml(c.note) + "</span></div>"
  ).join("");
  const files = d.files.map(f => "<code>" + escapeHtml(f) + "</code>").join("");
  show(resEl,
    "<h2>Result</h2><div style=\"margin-bottom:12px\">" + verdict + "</div>"
    + crits
    + '<div class="files" style="margin-top:14px"><span class="muted">Files saved to ' + escapeHtml(d.output_dir)
    + "</span><br><br>" + files + "</div>");
}

function renderRunner(funcs) {
  if (!funcs || funcs.length === 0) {
    show(runEl, '<h2>Run it</h2><div class="muted">No public functions were exposed to run.</div>');
    return;
  }
  let html = "<h2>Run it</h2>";
  for (const f of funcs) {
    const sig = f.params.map(p => p.name + (p.annotation ? ": " + p.annotation : "")).join(", ");
    html += '<div style="margin:14px 0 4px" class="fn">' + escapeHtml(f.name) + "(" + escapeHtml(sig) + ")</div>";
    if (f.doc) html += '<div class="doc">' + escapeHtml(f.doc) + "</div>";
    for (const p of f.params) {
      const ann = p.annotation ? ' <span class="ann">' + escapeHtml(p.annotation) + "</span>" : "";
      const ph = p.required ? "required" : ("optional, default " + (p.default ?? "None"));
      html += '<div class="row"><label>' + escapeHtml(p.name) + ann + "</label>"
        + '<input data-fn="' + escapeHtml(f.name) + '" data-p="' + escapeHtml(p.name)
        + '" placeholder="' + escapeHtml(ph) + '"></div>';
    }
    html += '<button class="btn" data-run="' + escapeHtml(f.name) + '">Run</button>'
      + '<div class="out" id="out-' + escapeHtml(f.name) + '"></div>';
  }
  show(runEl, html);
}

runEl.addEventListener("click", async (e) => {
  const btn = e.target.closest("button[data-run]");
  if (!btn) return;
  const name = btn.dataset.run;
  const args = {};
  document.querySelectorAll('input[data-fn="' + CSS.escape(name) + '"]')
    .forEach(i => { args[i.dataset.p] = i.value; });
  const out = $("out-" + name);
  out.className = "out"; out.textContent = "…";
  try {
    const data = await post("/call", { thread_id: threadId, func: name, args });
    if (data.ok) { out.className = "out ok"; out.textContent = fmt(data.result); }
    else { out.className = "out err"; out.textContent = data.error; }
  } catch (err) { out.className = "out err"; out.textContent = String(err); }
});

async function post(path, body) {
  const res = await fetch(path, {
    method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body),
  });
  return res.json();
}
function fmt(v) { return typeof v === "string" ? v : JSON.stringify(v, null, 2); }
function escapeHtml(s) { const d = document.createElement("div"); d.textContent = String(s); return d.innerHTML; }
</script>
</body></html>
